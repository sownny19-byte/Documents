  <!-- 設定 ES Modules 的 Import Map -->

<body class="bg-[#070b14] bg-[linear-gradient(to_right,#06b6d408_1px,transparent_1px),linear-gradient(to_bottom,#06b6d408_1px,transparent_1px)] bg-[size:24px_24px] antialiased selection:bg-cyan-500/30">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
      AreaChart, Area 
    } from 'recharts';
    import { 
      LayoutDashboard, Users, Settings, Download, Upload, 
      Plus, Trash2, Camera, TrendingUp, FileText, Activity, Save, Database,
      Terminal, Power, PowerOff, Map, Edit2, X, Clock, FileSpreadsheet,
      Cloud, UploadCloud, DownloadCloud, AlertCircle, ExternalLink, ShieldCheck, RefreshCw
    } from 'lucide-react';

    // Firebase 核心模組
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously } from 'firebase/auth';
    import { getFirestore, doc, setDoc, getDoc } from 'firebase/firestore';

    // Firebase 配置設定
    const firebaseConfig = {
      apiKey: "AIzaSyDQvEti4tuzuAxQvxCRqvzoCfiiXVgAH7I",
      authDomain: "volume-of-documents.firebaseapp.com",
      projectId: "volume-of-documents",
      storageBucket: "volume-of-documents.firebasestorage.app",
      messagingSenderId: "928182698971",
      appId: "1:928182698971:web:c47aaee2ddecaa66db9dfe"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "volume-of-documents";

    // --- 初始模擬資料 ---
    const GROUP_OPTIONS = ['桃園股', '北區股', '中區股', '南區股', '交控中心'];

    const initialPeople = [
      { id: 'p1', name: '坤能', district: '桃園(一)', group: '桃園股', isActive: true },
      { id: 'p2', name: '子豪', district: '桃園(二)', group: '桃園股', isActive: true },
      { id: 'p3', name: '宗彬', district: '桃園(三)', group: '桃園股', isActive: true },
      { id: 'p4', name: '鈺盛', district: '龜山(一)', group: '北區股', isActive: true },
      { id: 'p5', name: '騰科', district: '龜山(二)', group: '北區股', isActive: true },
      { id: 'p6', name: '瑞華', district: '大園觀音', group: '中區股', isActive: true },
      { id: 'p7', name: '政佑', district: '中壢(一)', group: '中區股', isActive: true },
      { id: 'p8', name: '予謙', district: '平鎮', group: '南區股', isActive: true },
      { id: 'p9', name: '禮安', district: '平鎮', group: '南區股', isActive: true },
      { id: 'p10', name: '信文', district: '交控專案', group: '交控中心', isActive: true },
      { id: 'p12', name: '冠德', district: '桃園(三)', group: '桃園股', isActive: true },
      { id: 'p13', name: '秉弦', district: '蘆竹(一)', group: '北區股', isActive: true },
      { id: 'p14', name: '柏孜', district: '八德(二)', group: '中區股', isActive: true },
      { id: 'p15', name: '小萱', district: '中壢(一)', group: '中區股', isActive: true },
      { id: 'p16', name: '淑垣', district: '道安綜合', group: '中區股', isActive: true },
      { id: 'p20', name: '雲蓉', district: '八德(一)', group: '中區股', isActive: true },
    ];

    const ADMIN_DISTRICTS = [
      { id: '大園', name: '大園區', path: 'M 200,250 L 230,190 L 260,160 L 320,120 L 360,110 L 380,160 L 400,210 L 420,270 L 380,280 L 340,285 L 310,290 L 270,270 L 240,265 Z', cx: 310, cy: 200 },
      { id: '蘆竹', name: '蘆竹區', path: 'M 360,110 L 400,90 L 440,80 L 480,70 L 510,120 L 540,180 L 560,250 L 530,260 L 500,255 L 480,260 L 450,265 L 420,270 L 400,210 L 380,160 Z', cx: 480, cy: 150 },
      { id: '龜山', name: '龜山區', path: 'M 480,70 L 560,50 L 650,80 L 740,120 L 820,180 L 840,250 L 860,320 L 780,360 L 720,380 L 650,420 L 630,390 L 600,360 L 580,300 L 560,250 L 540,180 L 510,120 Z', cx: 680, cy: 220 },
      { id: '桃園', name: '桃園區', path: 'M 480,260 L 500,255 L 530,260 L 560,250 L 580,300 L 600,360 L 560,380 L 520,410 L 490,340 Z', cx: 520, cy: 320 },
      { id: '八德', name: '八德區', path: 'M 520,410 L 560,380 L 600,360 L 630,390 L 650,420 L 620,460 L 580,480 L 540,460 L 500,450 L 510,430 Z', cx: 580, cy: 420 },
      { id: '大溪', name: '大溪區', path: 'M 650,420 L 720,380 L 780,360 L 860,320 L 890,380 L 920,450 L 850,520 L 720,580 L 650,620 L 580,640 L 460,650 L 500,600 L 540,540 L 580,480 L 620,460 Z', cx: 720, cy: 490 },
      { id: '觀音', name: '觀音區', path: 'M 120,400 L 150,340 L 180,280 L 200,250 L 240,265 L 270,270 L 310,290 L 280,340 L 260,380 L 200,390 Z', cx: 200, cy: 330 },
      { id: '中壢', name: '中壢區', path: 'M 310,290 L 340,285 L 380,280 L 420,270 L 450,265 L 480,260 L 490,340 L 520,410 L 510,430 L 500,450 L 470,480 L 420,530 L 360,540 L 300,550 L 280,450 L 260,380 L 280,340 Z', cx: 380, cy: 410 },
      { id: '新屋', name: '新屋區', path: 'M 80,680 L 60,600 L 60,520 L 80,460 L 120,400 L 200,390 L 260,380 L 280,450 L 300,550 L 250,600 L 200,750 L 140,720 Z', cx: 170, cy: 550 },
      { id: '平鎮', name: '平鎮區', path: 'M 420,530 L 470,480 L 500,450 L 540,460 L 580,480 L 540,540 L 500,600 L 460,650 L 400,640 L 340,620 L 380,580 Z', cx: 460, cy: 540 },
      { id: '楊梅', name: '楊梅區', path: 'M 200,750 L 250,600 L 300,550 L 360,540 L 420,530 L 380,580 L 340,620 L 330,680 L 350,780 L 280,780 Z', cx: 300, cy: 640 },
      { id: '龍潭', name: '龍潭區', path: 'M 350,780 L 330,680 L 340,620 L 400,640 L 460,650 L 580,640 L 650,620 L 720,580 L 680,680 L 600,760 L 500,820 L 420,810 Z', cx: 500, cy: 700 },
      { id: '復興', name: '復興區', path: 'M 720,580 L 850,520 L 920,450 L 960,550 L 980,650 L 940,800 L 880,950 L 750,960 L 650,920 L 560,860 L 500,820 L 600,760 L 680,680 Z', cx: 780, cy: 720 },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [people, setPeople] = useState([]);
      const [records, setRecords] = useState([]);
      const [groupLeaders, setGroupLeaders] = useState({});
      const [filterYear, setFilterYear] = useState('All');
      const [groupBy, setGroupBy] = useState('person');
      const [editingPersonId, setEditingPersonId] = useState(null);
      const [sysMsg, setSysMsg] = useState("");
      
      const [isInitialLoadDone, setIsInitialLoadDone] = useState(false);
      const [syncStatus, setSyncStatus] = useState("INIT_HANDSHAKE");
      const [syncColor, setSyncColor] = useState("text-yellow-500");

      const glassPanelClass = "bg-[#0f172a]/80 backdrop-blur-md border border-cyan-500/30 p-6 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.1)] relative overflow-hidden";
      const inputClass = "w-full bg-[#040810] border border-cyan-500/40 text-cyan-100 placeholder-cyan-800 rounded-lg shadow-[inset_0_0_10px_rgba(6,182,212,0.1)] focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 focus:outline-none transition-all px-3 py-2 text-sm";
      const labelClass = "block text-[10px] font-bold text-cyan-500 tracking-wider mb-1 uppercase opacity-80";
      const btnCyberClass = "bg-cyan-500/10 border border-cyan-400 text-cyan-300 hover:bg-cyan-400 hover:text-[#040810] px-4 py-2 rounded-lg font-black transition-all duration-300 shadow-[0_0_10px_rgba(6,182,212,0.2)] text-xs tracking-widest";

      const showMsg = (msg) => {
        setSysMsg(msg);
        setTimeout(() => setSysMsg(""), 6000);
      };

      const updateSyncStatus = (status, color) => {
        setSyncStatus(status);
        setSyncColor(color);
      };

      // 1. 系統啟動：自動從雲端 Firebase 載入資料
      useEffect(() => {
        const bootSystem = async () => {
          updateSyncStatus("CONNECTING_CLOUD...", "text-yellow-400");
          
          // 嘗試匿名登入 (即使失敗也不阻擋讀取)
          try {
             await signInAnonymously(auth);
          } catch (e) {
             console.warn("Auth bypass:", e.message);
          }

          let hasCloudData = false;
          try {
             const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'dashboard', 'main');
             const docSnap = await getDoc(docRef);
             
             if (docSnap.exists()) {
                 const data = docSnap.data();
                 if (data.people && data.people.length > 0) setPeople(data.people);
                 if (data.records && data.records.length > 0) setRecords(data.records);
                 if (data.groupLeaders) setGroupLeaders(data.groupLeaders);
                 hasCloudData = true;
                 updateSyncStatus("CLOUD_SYNCED", "text-emerald-500");
                 showMsg("✅ 雲端資料同步完成！目前顯示最新進度。");
             }
          } catch (e) {
             console.error("Cloud Fetch Error:", e);
             if (e.code === 'permission-denied') {
                 showMsg("⚠ 雲端權限被拒絕！請至 Firebase 控制台設定 Firestore 規則為 allow read, write: if true;");
                 updateSyncStatus("AUTH_REJECTED", "text-rose-500");
             } else {
                 updateSyncStatus("OFFLINE_MODE", "text-rose-400");
             }
          }

          // 如果雲端完全沒資料，再退回尋找本地緩存或產生假資料
          if (!hasCloudData) {
             const savedPeople = localStorage.getItem('doc_dash_people_v7');
             const savedRecords = localStorage.getItem('doc_dash_records_v7');
             const savedLeaders = localStorage.getItem('doc_dash_leaders_v7');
             if (savedPeople && savedRecords) {
               setPeople(JSON.parse(savedPeople));
               setRecords(JSON.parse(savedRecords));
               if (savedLeaders) setGroupLeaders(JSON.parse(savedLeaders));
             } else {
               setPeople(initialPeople);
               // 產生假資料...
               const initialData = [];
               const years = ['113', '114', '115'];
               let idCounter = 1;
               const hardcoded11503 = { '冠德': 190, '子豪': 170, '予謙': 154, '秉弦': 118, '柏孜': 112, '小萱': 109, '瑞華': 105, '淑垣': 100, '騰科': 89, '雲蓉': 63 };
               const hardcoded11504 = { '子豪': 145, '秉弦': 142, '冠德': 128, '小萱': 116, '予謙': 101, '淑垣': 95, '瑞華': 93, '柏孜': 88, '騰科': 77, '雲蓉': 72 };
               years.forEach(year => {
                 for (let month = 1; month <= 12; month++) {
                   if (year === '115' && month > 5) break;
                   initialPeople.forEach(person => {
                     let volume = 0;
                     if (year === '115' && month === 3) volume = hardcoded11503[person.name] || 0;
                     else if (year === '115' && month === 4) volume = hardcoded11504[person.name] || 0;
                     else volume = Math.floor(Math.random() * 60) + 40;
                     initialData.push({ id: `r${idCounter++}`, year, month: month.toString(), personId: person.id, volume });
                   });
                 }
               });
               setRecords(initialData);
             }
             if(syncStatus !== "AUTH_REJECTED") updateSyncStatus("LOCAL_ONLY", "text-yellow-500");
          }
          
          setIsInitialLoadDone(true);
        };
        
        bootSystem();
      }, []);

      // 2. 自動背景存檔與雲端上傳 (Auto-Save)
      useEffect(() => {
        if (!isInitialLoadDone) return; // 避免一啟動就把空資料蓋掉雲端

        // 存到本地
        localStorage.setItem('doc_dash_people_v7', JSON.stringify(people));
        localStorage.setItem('doc_dash_records_v7', JSON.stringify(records));
        localStorage.setItem('doc_dash_leaders_v7', JSON.stringify(groupLeaders));

        // 存到雲端 (Debounce 延遲 1.5 秒，避免連續輸入時瘋狂發送請求)
        updateSyncStatus("SAVING...", "text-yellow-400");
        const timer = setTimeout(async () => {
           try {
               const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'dashboard', 'main');
               await setDoc(docRef, {
                  people, records, groupLeaders,
                  lastUpdated: new Date().toISOString()
               });
               updateSyncStatus("CLOUD_SYNCED", "text-emerald-500");
           } catch (e) {
               console.error("Auto-sync error:", e);
               updateSyncStatus("SYNC_FAILED", "text-rose-500");
           }
        }, 1500);

        return () => clearTimeout(timer);
      }, [people, records, groupLeaders, isInitialLoadDone]);

      const availableYears = useMemo(() => {
        const years = new Set(records.map(r => r.year));
        return Array.from(years).sort().reverse();
      }, [records]);

      const getPerson = (id) => {
        const p = people.find(p => p.id === id);
        return p ? { ...p, isActive: p.isActive !== false } : { name: '未知', district: '未知', group: '未知', isActive: false };
      };

      const exportChartAsPNG = (chartId, filename) => {
        const svgElement = document.querySelector(`#${chartId} svg`);
        if (!svgElement) return showMsg("找不到圖表元素！");
        const svgData = new XMLSerializer().serializeToString(svgElement);
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const img = new Image();
        const rect = svgElement.getBoundingClientRect();
        canvas.width = rect.width * 2;
        canvas.height = rect.height * 2;
        img.onload = () => {
          ctx.fillStyle = "#0f172a"; 
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const a = document.createElement("a");
          a.download = `${filename}.png`;
          a.href = canvas.toDataURL("image/png");
          a.click();
        };
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
      };

      const handleExportBackup = () => {
        const backup = { people, records, groupLeaders, exportDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Backup_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImportBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.people && data.records) {
              setPeople(data.people);
              setRecords(data.records);
              if (data.groupLeaders) setGroupLeaders(data.groupLeaders);
              showMsg('✅ 資料還原成功！');
            } else {
              showMsg('❌ 檔案格式不正確！');
            }
          } catch (err) {
            showMsg('❌ 解析失敗！');
          }
        };
        reader.readAsText(file);
      };

      const dashboardData = useMemo(() => {
        let filtered = records;
        if (filterYear !== 'All') filtered = records.filter(r => r.year === filterYear);
        const totalVolume = filtered.reduce((sum, r) => sum + r.volume, 0);
        const monthsCount = new Set(filtered.map(r => `${r.year}-${r.month}`)).size || 1;
        const monthlyAvg = Math.round(totalVolume / monthsCount);

        const trendMap = {};
        filtered.forEach(r => {
          const label = filterYear === 'All' ? `${r.year}年${r.month}月` : `${r.month}月`;
          const sortKey = filterYear === 'All' ? `${r.year}-${r.month.padStart(2, '0')}` : r.month.padStart(2, '0');
          if (!trendMap[sortKey]) trendMap[sortKey] = { name: label, '總件數': 0 };
          trendMap[sortKey]['總件數'] += r.volume;
        });

        const breakdownMap = {};
        filtered.forEach(r => {
          const person = getPerson(r.personId);
          let key = (groupBy === 'person') ? (person.name + (person.isActive ? '' : '(離)')) : (groupBy === 'district' ? person.district : (groupBy === 'group' ? person.group : (r.year + ' 年度')));
          if (!breakdownMap[key]) breakdownMap[key] = { name: key, '件數': 0 };
          breakdownMap[key]['件數'] += r.volume;
        });

        const mapVolumes = {};
        ADMIN_DISTRICTS.forEach(d => mapVolumes[d.id] = 0);
        filtered.forEach(r => {
          const person = getPerson(r.personId);
          const matched = ADMIN_DISTRICTS.filter(d => (person.district || '').includes(d.id));
          if (matched.length > 0) {
            const splitVol = r.volume / matched.length;
            matched.forEach(d => { mapVolumes[d.id] += splitVol; });
          }
        });

        let maxMapId = null;
        let maxMapVol = -1;
        ADMIN_DISTRICTS.forEach(d => { if(mapVolumes[d.id] > maxMapVol) { maxMapVol = mapVolumes[d.id]; maxMapId = d.id; }});

        return { 
          totalVolume, monthlyAvg, 
          trendChartData: Object.keys(trendMap).sort().map(k => trendMap[k]), 
          breakdownChartData: Object.values(breakdownMap).sort((a,b) => b.件數 - a.件數), 
          mapVolumes, maxMapId 
        };
      }, [records, filterYear, groupBy, people]);

      const navItemClass = (isActive) => `w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-300 font-black tracking-widest text-xs ${isActive ? 'bg-cyan-500/20 text-cyan-300 border-l-4 border-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.15)]' : 'text-slate-500 hover:bg-[#0f172a] hover:text-cyan-100'}`;

      if (!isInitialLoadDone) {
         return (
            <div className="min-h-screen bg-[#070b14] flex flex-col items-center justify-center text-cyan-500 space-y-4 font-mono font-bold tracking-widest">
               <Activity className="w-12 h-12 animate-pulse" />
               <p>INITIALIZING_SYSTEM...</p>
               <p className="text-[10px] text-slate-500">Checking Cloud Synchronization</p>
            </div>
         );
      }

      return (
        <div className="min-h-screen text-slate-200 flex flex-col md:flex-row font-sans selection:bg-cyan-500/30">
          
          {sysMsg && (
            <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[100] bg-[#020617]/95 border-2 border-cyan-500/50 px-8 py-4 rounded-2xl shadow-[0_0_40px_rgba(6,182,212,0.4)] text-cyan-100 font-black text-sm tracking-widest flex items-center gap-4 animate-in slide-in-from-top-10">
               <div className="w-2 h-2 rounded-full bg-cyan-400 animate-glow"></div>
               {sysMsg}
            </div>
          )}

          <aside className="w-full md:w-72 bg-[#040810]/95 border-r border-cyan-500/20 flex-shrink-0 z-20 relative flex flex-col">
            <div className="p-8">
              <div className="flex items-center gap-4 mb-3">
                <div className="p-2.5 bg-cyan-500/10 rounded-xl border border-cyan-500/30">
                  <Activity className="w-6 h-6 text-cyan-400" />
                </div>
                <h1 className="text-lg font-black text-transparent bg-clip-text bg-gradient-to-br from-cyan-200 to-blue-500 leading-tight">Volume of Documents</h1>
              </div>
              <p className="text-cyan-800 font-mono text-[9px] tracking-[0.3em] uppercase pl-1">Operational Matrix v12.0</p>
            </div>
            
            <nav className="px-5 space-y-2.5 flex-1">
              <button onClick={() => setActiveTab('dashboard')} className={navItemClass(activeTab === 'dashboard')}><LayoutDashboard className="w-4 h-4"/>視覺矩陣 // DASHBOARD</button>
              <button onClick={() => setActiveTab('personnel')} className={navItemClass(activeTab === 'personnel')}><Users className="w-4 h-4"/>節點管理 // NODES</button>
              <button onClick={() => setActiveTab('settings')} className={navItemClass(activeTab === 'settings')}><Settings className="w-4 h-4"/>系統維運 // SYSTEM</button>
            </nav>

            <div className="p-6 mt-auto">
               <div className="bg-slate-900/40 border border-slate-800 rounded-2xl p-4 cursor-help group" title="資料變更時會自動上傳至雲端">
                  <div className="flex justify-between items-center text-[9px] font-black text-slate-500 mb-2 uppercase">
                    <span className="flex items-center gap-1"><RefreshCw className={`w-3 h-3 ${syncStatus === 'SAVING...' ? 'animate-spin' : ''}`} /> Sync Status</span>
                    <span className={syncColor}>
                      {syncStatus}
                    </span>
                  </div>
                  <div className="h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div className={`h-full transition-all duration-1000 ${syncStatus === 'CLOUD_SYNCED' ? 'bg-emerald-500 w-full' : (syncStatus === 'AUTH_REJECTED' || syncStatus === 'SYNC_FAILED' ? 'bg-rose-500 w-full' : 'bg-yellow-500 w-1/3 animate-pulse')}`}></div>
                  </div>
               </div>
            </div>
          </aside>

          <main className="flex-1 p-4 md:p-10 overflow-y-auto custom-scrollbar">
            <div className="max-w-7xl mx-auto space-y-8">
              
              {activeTab === 'dashboard' && (
                <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  <div className={`${glassPanelClass} !p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4`}>
                     <div className="flex items-center gap-3 pl-2">
                        <Terminal className="w-4 h-4 text-cyan-500" />
                        <h2 className="text-sm font-black text-cyan-100 uppercase tracking-widest">Geospatial Distribution</h2>
                     </div>
                     <div className="flex gap-1.5 bg-[#020617] p-1 rounded-xl border border-cyan-500/20">
                       <button onClick={() => setFilterYear('All')} className={`px-4 py-1.5 rounded-lg text-[10px] font-black transition-all ${filterYear === 'All' ? 'bg-cyan-500 text-[#020617] shadow-lg shadow-cyan-500/20' : 'text-slate-500 hover:text-cyan-400'}`}>ALL</button>
                       {availableYears.map(y => <button key={y} onClick={() => setFilterYear(y)} className={`px-4 py-1.5 rounded-lg text-[10px] font-black transition-all ${filterYear === y ? 'bg-cyan-500 text-[#020617] shadow-lg shadow-cyan-500/20' : 'text-slate-500 hover:text-cyan-400'}`}>{y}</button>)}
                     </div>
                  </div>

                  <div id="map-chart" className="w-full bg-[#020408] rounded-3xl border border-slate-800 h-[600px] lg:h-[800px] relative overflow-hidden shadow-2xl">
                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,#06b6d405,transparent_70%)]"></div>
                    <svg viewBox="20 40 960 940" className="w-full h-full relative z-10">
                      {ADMIN_DISTRICTS.map(d => {
                        const vol = dashboardData.mapVolumes[d.id] || 0;
                        const isMax = d.id === dashboardData.maxMapId && vol > 0;
                        return (
                          <g key={d.id} className="transition-all duration-300 group cursor-crosshair">
                            <path d={d.path} fill={isMax ? "rgba(244, 63, 94, 0.15)" : "rgba(15, 23, 42, 0.4)"} stroke={isMax ? "#f43f5e" : "#0ea5e9"} strokeWidth={isMax ? "5" : "2"} className="group-hover:fill-cyan-900/40 transition-all duration-300" />
                            <g transform={`translate(${d.cx}, ${d.cy})`}>
                              {isMax && <circle r="40" fill="#f43f5e" className="animate-ping opacity-10" />}
                              <circle r={isMax ? 6 : 4} fill="#0f172a" stroke={isMax ? "#f43f5e" : "#22d3ee"} strokeWidth="2" />
                              <text y="-18" fontSize="20" fill={isMax ? "#fda4af" : "#f8fafc"} textAnchor="middle" fontWeight="900" style={{ pointerEvents: 'none' }} className="drop-shadow-lg">{d.name}</text>
                              {vol > 0 && <text y="32" fontSize="14" fill="#38bdf8" textAnchor="middle" fontWeight="bold" style={{ pointerEvents: 'none' }}>{Math.round(vol)} 件</text>}
                            </g>
                          </g>
                        );
                      })}
                    </svg>
                  </div>

                  <div className={glassPanelClass}>
                     <div className="flex justify-between items-center mb-8">
                        <h3 className="text-xs font-black text-cyan-300 flex items-center gap-2 tracking-[0.2em] uppercase"><Activity className="w-4 h-4"/> Volume Trend Matrix</h3>
                        <button onClick={() => exportChartAsPNG('map-chart', 'PublicMatrix_Map')} className="p-2 hover:bg-white/5 rounded-lg transition-colors"><Camera className="w-4 h-4 text-slate-500"/></button>
                     </div>
                     <div className="h-[350px] w-full">
                       <ResponsiveContainer>
                        <AreaChart data={dashboardData.trendChartData}>
                          <defs><linearGradient id="colorCyan" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#22d3ee" stopOpacity={0.4}/><stop offset="95%" stopColor="#22d3ee" stopOpacity={0}/></linearGradient></defs>
                          <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false}/>
                          <XAxis dataKey="name" tick={{fill: '#475569', fontSize: 10, fontWeight: 700}} axisLine={false} tickLine={false} dy={10}/>
                          <YAxis tick={{fill: '#475569', fontSize: 10, fontWeight: 700}} axisLine={false} tickLine={false}/>
                          <Tooltip contentStyle={{backgroundColor: '#020617', border: '1px solid #1e293b', borderRadius: '12px', fontSize: '12px'}}/>
                          <Area type="monotone" dataKey="總件數" stroke="#06b6d4" strokeWidth={3} fill="url(#colorCyan)" animationDuration={1500}/>
                        </AreaChart>
                       </ResponsiveContainer>
                     </div>
                  </div>
                </div>
              )}

              {activeTab === 'settings' && (
                <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  
                  {syncStatus === "AUTH_REJECTED" && (
                    <div className="bg-rose-950/20 border-2 border-rose-500/50 p-8 rounded-3xl text-rose-100 flex flex-col md:flex-row items-center md:items-start gap-8 shadow-[0_0_30px_rgba(244,63,94,0.1)]">
                      <div className="p-4 bg-rose-500/20 rounded-2xl shrink-0"><AlertCircle className="w-10 h-10 text-rose-500 animate-pulse" /></div>
                      <div className="flex-1 space-y-4">
                         <h3 className="font-black text-xl tracking-widest text-rose-400">CLOUD_AUTHORIZATION_FAILED</h3>
                         <p className="text-slate-400 text-sm leading-relaxed">偵測到 Firebase 專案規則未設定。為了讓背景自動上傳功能運作，您必須開放 Firestore 資料庫的讀寫權限。</p>
                         <div className="grid grid-cols-1 gap-3 py-2">
                           <div className="flex items-center gap-3 text-xs font-mono bg-black/40 p-3 rounded-lg border border-rose-500/20"><span className="text-rose-500">Step 1.</span> 進入 Firebase Console 選擇專案。</div>
                           <div className="flex items-center gap-3 text-xs font-mono bg-black/40 p-3 rounded-lg border border-rose-500/20"><span className="text-rose-500">Step 2.</span> 前往 Firestore Database > Rules (規則)。</div>
                           <div className="flex items-center gap-3 text-xs font-mono bg-black/40 p-3 rounded-lg border border-rose-500/20"><span className="text-rose-500">Step 3.</span> 將代碼改為 <code>allow read, write: if true;</code> 並點擊 Publish 發布。</div>
                         </div>
                         <a href="https://console.firebase.google.com/" target="_blank" className="inline-flex items-center gap-2 px-6 py-2.5 bg-rose-600 text-white rounded-xl font-black text-xs hover:bg-rose-500 transition-all shadow-lg shadow-rose-600/20">前往專案控制台 <ExternalLink className="w-4 h-4"/></a>
                      </div>
                    </div>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div className={`${glassPanelClass} text-center p-12 group flex flex-col`}>
                       <div className="w-20 h-20 bg-emerald-500/10 border border-emerald-500/30 rounded-3xl flex items-center justify-center mx-auto mb-8 group-hover:scale-110 transition-all group-hover:shadow-[0_0_30px_rgba(16,185,129,0.3)]"><Cloud className="w-10 h-10 text-emerald-400" /></div>
                       <h2 className="text-lg font-black mb-2 uppercase tracking-[0.3em]">Auto Cloud Sync</h2>
                       <p className="text-slate-500 text-xs mb-10 leading-relaxed px-4">系統已升級為「雲端優先」模式。當您新增或編輯資料時，系統會在 1.5 秒內自動將進度推送至 Firebase 雲端，無需再手動點擊上傳。</p>
                       <div className="grid grid-cols-1 gap-4 mt-auto">
                         <div className="flex flex-col items-center justify-center p-4 bg-black/30 rounded-2xl border border-slate-800">
                           <span className="text-[10px] text-slate-500 font-mono tracking-widest mb-2">CURRENT SYNC STATUS</span>
                           <span className={`font-black tracking-widest ${syncColor}`}>{syncStatus}</span>
                         </div>
                       </div>
                    </div>

                    <div className={`${glassPanelClass} text-center p-12 group flex flex-col`}>
                       <div className="w-20 h-20 bg-blue-500/10 border border-blue-500/30 rounded-3xl flex items-center justify-center mx-auto mb-8 group-hover:scale-110 transition-all group-hover:shadow-[0_0_30px_rgba(59,130,246,0.3)]"><Save className="w-10 h-10 text-blue-400" /></div>
                       <h2 className="text-lg font-black mb-2 uppercase tracking-[0.3em]">Local Data Backup</h2>
                       <p className="text-slate-500 text-xs mb-10 leading-relaxed px-4">若雲端服務中斷，您仍可將當前資料以 JSON 格式匯出至本機磁碟，作為核心備援方案或手動遷移之用途。</p>
                       <div className="grid grid-cols-1 gap-4 mt-auto">
                         <button onClick={handleExportBackup} className="flex items-center justify-center gap-3 px-6 py-4 bg-blue-600 text-white rounded-2xl font-black text-xs tracking-widest hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/20"><Download className="w-5 h-5"/> EXPORT_SNAPSHOT</button>
                         <label className="flex items-center justify-center gap-3 px-6 py-4 border-2 border-slate-700 text-slate-300 rounded-2xl font-black text-xs tracking-widest hover:border-blue-500 hover:text-blue-400 cursor-pointer transition-all"><Upload className="w-5 h-5"/> RESTORE_IMPORT<input type="file" className="hidden" onChange={handleImportBackup}/></label>
                       </div>
                    </div>
                  </div>
                </div>
              )}
              
              {activeTab === 'personnel' && (
                 <PersonnelManager 
                    people={people} setPeople={setPeople} setEditingPersonId={setEditingPersonId} 
                    groupLeaders={groupLeaders} setGroupLeaders={setGroupLeaders} 
                    GROUP_OPTIONS={GROUP_OPTIONS} 
                    glassPanelClass={glassPanelClass} inputClass={inputClass} labelClass={labelClass} btnCyberClass={btnCyberClass} 
                    showMsg={showMsg} 
                 />
              )}
            </div>
          </main>

          {editingPersonId && (
            <PersonDetailModal 
              personId={editingPersonId} onClose={() => setEditingPersonId(null)} 
              records={records} setRecords={setRecords} getPerson={getPerson} 
              showMsg={showMsg} glassPanelClass={glassPanelClass} inputClass={inputClass} labelClass={labelClass} btnCyberClass={btnCyberClass} 
            />
          )}
        </div>
      );
    }

    // --- PersonnelManager 子組件 ---
    const PersonnelManager = ({ people, setPeople, setEditingPersonId, groupLeaders, setGroupLeaders, GROUP_OPTIONS, glassPanelClass, inputClass, labelClass, btnCyberClass, showMsg }) => {
      const [newPerson, setNewPerson] = useState({ name: '', district: '', group: GROUP_OPTIONS[0], isActive: true });
      const [activeGroupTab, setActiveGroupTab] = useState(GROUP_OPTIONS[0]);
      const [editingNodeId, setEditingNodeId] = useState(null);
      const [editingLeaderGroup, setEditingLeaderGroup] = useState(null);
      const [tempLeaderName, setTempLeaderName] = useState('');

      const handleUpsertPerson = (e) => {
        e.preventDefault();
        if (!newPerson.name || !newPerson.district) return showMsg('IDENTIFIER_ERROR: 資料欄位不完整。');
        if (editingNodeId) {
          setPeople(people.map(p => p.id === editingNodeId ? { ...p, ...newPerson } : p));
          setEditingNodeId(null);
          showMsg("人員節點資訊已同步更新。");
        } else {
          setPeople([...people, { id: 'p' + Date.now(), ...newPerson }]);
          showMsg("已成功建立新的人員節點。");
        }
        setNewPerson({ name: '', district: '', group: activeGroupTab, isActive: true });
      };

      const handleEditNode = (p) => {
        setEditingNodeId(p.id);
        setNewPerson({ name: p.name, district: p.district, group: p.group, isActive: p.isActive !== false });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const currentList = people.filter(p => p.group === activeGroupTab).sort((a,b) => (a.isActive === b.isActive) ? 0 : a.isActive ? -1 : 1);

      return (
        <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div className={glassPanelClass}>
            <h2 className="text-[10px] font-black text-cyan-300 tracking-[0.3em] uppercase mb-8">{editingNodeId ? 'Edit Network Node' : 'Initialize New Node'}</h2>
            <form onSubmit={handleUpsertPerson} className="grid grid-cols-1 md:grid-cols-5 gap-6 items-end relative z-10">
              <div><label className={labelClass}>識別碼 (姓名)</label><input type="text" value={newPerson.name} onChange={e => setNewPerson({...newPerson, name: e.target.value})} className={inputClass} placeholder="ID_IDENTIFIER"/></div>
              <div><label className={labelClass}>隸屬群集 (股別)</label><select value={newPerson.group} onChange={e => setNewPerson({...newPerson, group: e.target.value})} className={inputClass}>{GROUP_OPTIONS.map(g => <option key={g} value={g} className="bg-[#0f172a]">{g}</option>)}</select></div>
              <div><label className={labelClass}>負責扇區 (轄區)</label><input type="text" value={newPerson.district} onChange={e => setNewPerson({...newPerson, district: e.target.value})} className={inputClass} placeholder="SECTOR_LOC"/></div>
              <div className="flex gap-2">
                <button type="submit" className={`${btnCyberClass} flex-1 uppercase`}>{editingNodeId ? 'Update' : 'Execute'}</button>
                {editingNodeId && <button type="button" onClick={() => { setEditingNodeId(null); setNewPerson({ name: '', district: '', group: activeGroupTab, isActive: true }); }} className="bg-red-500/10 border border-red-500/50 p-2 rounded-lg text-red-500 transition-all"><X className="w-5 h-5"/></button>}
              </div>
            </form>
          </div>
          <div className="bg-[#0f172a]/60 border border-slate-700/50 rounded-3xl overflow-hidden shadow-2xl">
             <div className="flex overflow-x-auto bg-[#040810]/80 border-b border-cyan-500/20 custom-scrollbar p-1">
               {GROUP_OPTIONS.map(g => <button key={g} onClick={() => { setActiveGroupTab(g); setEditingLeaderGroup(null); }} className={`px-8 py-5 text-[10px] font-black tracking-widest transition-all border-b-4 whitespace-nowrap uppercase ${activeGroupTab === g ? 'border-cyan-400 text-cyan-300 bg-cyan-500/5' : 'border-transparent text-slate-500'}`}>{g}</button>)}
             </div>
             <div className="p-6 border-b border-slate-800 flex items-center justify-between bg-slate-950/40">
               <span className="text-[10px] text-slate-500 font-black tracking-[0.2em] uppercase">Sector Chief: <span className="text-cyan-100 text-xl ml-3 font-black">{groupLeaders[activeGroupTab] || 'UNDEFINED'}</span></span>
               <button onClick={() => { setTempLeaderName(groupLeaders[activeGroupTab] || ''); setEditingLeaderGroup(activeGroupTab); }} className="p-2.5 bg-slate-800 rounded-xl text-slate-400 hover:text-cyan-400 shadow-lg"><Edit2 className="w-4 h-4"/></button>
             </div>
             {editingLeaderGroup && (
               <div className="p-6 bg-cyan-950/20 flex gap-4 animate-in slide-in-from-top-4">
                 <input type="text" value={tempLeaderName} onChange={e => setTempLeaderName(e.target.value)} className={`${inputClass} !py-3`} placeholder="Enter Name..."/>
                 <button onClick={() => { setGroupLeaders({...groupLeaders, [activeGroupTab]: tempLeaderName}); setEditingLeaderGroup(null); showMsg("股長名單已更新。"); }} className="px-6 py-2 bg-emerald-500 text-[#020617] rounded-xl font-black text-xs hover:brightness-110"><Save className="w-5 h-5"/></button>
               </div>
             )}
             <table className="min-w-full divide-y divide-slate-800/50">
               <thead className="bg-[#0a101f]/80"><tr><th className="px-8 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Status</th><th className="px-8 py-4 text-left text-[10px] font-black text-slate-400 uppercase">Node Identifier</th><th className="px-8 py-4 text-right text-[10px] font-black text-slate-400 uppercase">Protocol</th></tr></thead>
               <tbody className="divide-y divide-slate-800/50">
                 {currentList.map(p => (
                   <tr key={p.id} className={`${p.isActive ? 'hover:bg-cyan-500/5' : 'opacity-40'} transition-all`}>
                     <td className="px-8 py-5 whitespace-nowrap text-[9px] font-black">{p.isActive ? 'ACTIVE' : 'OFFLINE'}</td>
                     <td className="px-8 py-5 whitespace-nowrap text-sm font-black text-cyan-50">{p.name} <span className="text-[10px] text-slate-500 ml-2 font-mono uppercase">[{p.district}]</span></td>
                     <td className="px-8 py-5 text-right flex justify-end gap-2.5">
                       <button onClick={() => setEditingPersonId(p.id)} className="p-2.5 bg-purple-500/10 rounded-xl text-purple-400 hover:bg-purple-500/20"><FileSpreadsheet className="w-4 h-4"/></button>
                       <button onClick={() => handleEditNode(p)} className="p-2.5 bg-emerald-500/10 rounded-xl text-emerald-400 hover:bg-emerald-500/20"><Edit2 className="w-4 h-4"/></button>
                       <button onClick={() => { if(window.confirm('確定移除？')) setPeople(people.filter(x => x.id !== p.id)); }} className="p-2.5 bg-red-500/10 rounded-xl text-red-400 hover:bg-red-500/20"><Trash2 className="w-4 h-4"/></button>
                     </td>
                   </tr>
                 ))}
               </tbody>
             </table>
          </div>
        </div>
      );
    };

    // --- PersonDetailModal 子組件 ---
    const PersonDetailModal = ({ personId, onClose, records, setRecords, getPerson, showMsg, glassPanelClass, inputClass, labelClass, btnCyberClass }) => {
      const person = getPerson(personId);
      const [year, setYear] = useState('115');
      const [month, setMonth] = useState('1');
      const [vol, setVol] = useState('');
      const pRecs = useMemo(() => records.filter(r => r.personId === personId).sort((a,b) => parseInt(a.year+a.month.padStart(2,'0')) - parseInt(b.year+b.month.padStart(2,'0'))), [records, personId]);

      const handleSave = (e) => {
        e.preventDefault();
        if (!vol) return showMsg("⚠ 請輸入件數");
        const existing = records.findIndex(r => r.personId === personId && r.year === year && r.month === month);
        if (existing >= 0) {
          const updated = [...records]; updated[existing].volume = parseInt(vol);
          setRecords(updated);
        } else {
          setRecords([...records, { id: 'r'+Date.now(), year, month, personId, volume: parseInt(vol) }]);
        }
        setVol(''); showMsg("資料已登錄");
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-[#020617]/90 backdrop-blur-md" onClick={onClose}></div>
          <div className="relative w-full max-w-2xl bg-[#0f172a] border border-cyan-500/40 rounded-[2.5rem] overflow-hidden flex flex-col max-h-[85vh] shadow-2xl">
            <div className="p-10 border-b border-cyan-500/20 flex justify-between items-start bg-[#040810]/60">
              <div><h2 className="text-3xl font-black text-cyan-100 uppercase">{person.name}</h2><p className="text-[10px] text-cyan-600 font-mono tracking-[0.4em] uppercase mt-2">Sector_{person.district}</p></div>
              <button onClick={onClose} className="p-3 bg-slate-800 rounded-2xl text-slate-400 hover:text-white transition-all"><X className="w-6 h-6"/></button>
            </div>
            <div className="p-10 overflow-y-auto space-y-8 custom-scrollbar">
              <form onSubmit={handleSave} className="grid grid-cols-4 gap-6 items-end bg-cyan-950/10 p-6 rounded-3xl border border-cyan-500/10">
                <div><label className={labelClass}>YEAR</label><input type="number" value={year} onChange={e=>setYear(e.target.value)} className={`${inputClass} !py-2.5`}/></div>
                <div><label className={labelClass}>MONTH</label><select value={month} onChange={e=>setMonth(e.target.value)} className={`${inputClass} !py-2.5`}>{[...Array(12)].map((_,i)=><option key={i+1} value={i+1}>{i+1}月</option>)}</select></div>
                <div><label className={labelClass}>VOL</label><input type="number" value={vol} onChange={e=>setVol(e.target.value)} className={`${inputClass} !py-2.5`} placeholder="NUM"/></div>
                <button type="submit" className={`${btnCyberClass} !py-3 uppercase`}>Commit</button>
              </form>
              <table className="min-w-full text-sm">
                <thead className="bg-[#0a101f]/80 text-slate-500 uppercase tracking-widest text-[9px] font-black"><tr><th className="text-left px-6 py-4">Time</th><th className="text-right px-6 py-4">Vol</th><th className="text-right px-6 py-4">Action</th></tr></thead>
                <tbody className="divide-y divide-slate-800/40">
                  {pRecs.map(r => (
                    <tr key={r.id} className="hover:bg-cyan-500/5">
                      <td className="px-6 py-4 font-mono text-cyan-50">{r.year} 年 {r.month.padStart(2,'0')} 月</td>
                      <td className="px-6 py-4 text-right font-black text-cyan-400 text-lg tabular-nums">{r.volume}</td>
                      <td className="px-6 py-4 text-right"><button onClick={() => { if(window.confirm('確定抹除？')) setRecords(records.filter(x=>x.id!==r.id)); }} className="p-2 text-red-500/30 hover:text-red-500 transition-all"><Trash2 className="w-4 h-4"/></button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
