<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公文量分析儀表板</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 Babel (用於在瀏覽器端即時編譯 React JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 設定 ES Modules 的 Import Map (指向現代的 ESM CDN) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "recharts": "https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
      }
    }
  </script>

  <!-- 全域自訂樣式 -->
  <style>
    body {
      background-color: #070b14;
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }
    .custom-scrollbar::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);

    .custom-scrollbar::-webkit-scrollbar-thumb {

</head>
<body class="bg-[#070b14] bg-[linear-gradient(to_right,#06b6d408_1px,transparent_1px),linear-gradient(to_bottom,#06b6d408_1px,transparent_1px)] bg-[size:24px_24px] antialiased selection:bg-cyan-500/30">
  
  <!-- React 應用程式掛載點 -->
  <div id="root"></div>

  <!-- 應用程式主邏輯 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
      AreaChart, Area 
    } from 'recharts';
    import { 
      LayoutDashboard, Users, Settings, Download, Upload, 
      Plus, Trash2, Camera, TrendingUp, FileText, Activity, Save, Database,
      Terminal, Power, PowerOff, Map, Edit2, X, Clock, FileSpreadsheet
    } from 'lucide-react';

    // --- 初始模擬資料 ---
    const GROUP_OPTIONS = ['桃園股', '北區股', '中區股', '南區股', '交控中心'];

    const initialPeople = [
      { id: 'p1', name: '坤能', district: '桃園(一)', group: '桃園股', isActive: true },
      { id: 'p2', name: '子豪', district: '桃園(二)', group: '桃園股', isActive: true },
      { id: 'p3', name: '宗彬', district: '桃園(三)', group: '桃園股', isActive: true },
      { id: 'p4', name: '鈺盛', district: '龜山(一)', group: '北區股', isActive: true },
      { id: 'p5', name: '騰科', district: '龜山(二)', group: '北區股', isActive: true },
      { id: 'p6', name: '瑞華', district: '大園觀音', group: '中區股', isActive: true },
      { id: 'p7', name: '政佑', district: '中壢(一)', group: '中區股', isActive: true },
      { id: 'p8', name: '予謙', district: '平鎮', group: '南區股', isActive: true },
      { id: 'p9', name: '禮安', district: '平鎮', group: '南區股', isActive: true },
      { id: 'p10', name: '信文', district: '交控專案', group: '交控中心', isActive: true },
      { id: 'p12', name: '冠德', district: '桃園(三)', group: '桃園股', isActive: true },
      { id: 'p13', name: '秉弦', district: '蘆竹(一)', group: '北區股', isActive: true },
      { id: 'p14', name: '柏孜', district: '八德(二)', group: '中區股', isActive: true },
      { id: 'p15', name: '小萱', district: '中壢(一)', group: '中區股', isActive: true },
      { id: 'p16', name: '淑垣', district: '道安綜合', group: '中區股', isActive: true },
      { id: 'p20', name: '雲蓉', district: '八德(一)', group: '中區股', isActive: true },
    ];

    const generateMockRecords = () => {
      const records = [];
      const years = ['113', '114', '115'];
      let idCounter = 1;
      
      const hardcoded11503 = {
        '冠德': 190, '子豪': 170, '予謙': 154, '秉弦': 118, '柏孜': 112,
        '小萱': 109, '瑞華': 105, '淑垣': 100,
        '騰科': 89, '雲蓉': 63
      };

      const hardcoded11504 = {
        '子豪': 145, '秉弦': 142, '冠德': 128, '小萱': 116,
        '謙謙': 101, '淑垣': 95, '瑞華': 93, '柏孜': 88,
        '騰科': 77, '雲蓉': 72
      };

      years.forEach(year => {
        for (let month = 1; month <= 12; month++) {
          if (year === '115' && month > 5) break;
          
          initialPeople.forEach(person => {
            let volume = 0;
            
            if (year === '115' && month === 3) {
              volume = hardcoded11503[person.name] || 0;
            } else if (year === '115' && month === 4) {
              if (person.name === '予謙') {
                volume = hardcoded11504['謙謙'] || 0;
              } else {
                volume = hardcoded11504[person.name] || 0;
              }
            } else {
              const base = Math.floor(Math.random() * 60) + 40; 
              const seasonality = (month === 3 || month === 12) ? 30 : 0;
              volume = base + seasonality + Math.floor(Math.random() * 20);
            }

            records.push({
              id: `r${idCounter++}`,
              year,
              month: month.toString(),
              personId: person.id,
              volume: volume
            });
          });
        }
      });
      return records;
    };

    const initialRecords = generateMockRecords();

    // --- 桃園市行政區 極高擬真戰術多邊形 ---
    const ADMIN_DISTRICTS = [
      { id: '大園', name: '大園區', path: 'M 200,250 L 230,190 L 260,160 L 320,120 L 360,110 L 380,160 L 400,210 L 420,270 L 380,280 L 340,285 L 310,290 L 270,270 L 240,265 Z', cx: 310, cy: 200 },
      { id: '蘆竹', name: '蘆竹區', path: 'M 360,110 L 400,90 L 440,80 L 480,70 L 510,120 L 540,180 L 560,250 L 530,260 L 500,255 L 480,260 L 450,265 L 420,270 L 400,210 L 380,160 Z', cx: 480, cy: 150 },
      { id: '龜山', name: '龜山區', path: 'M 480,70 L 560,50 L 650,80 L 740,120 L 820,180 L 840,250 L 860,320 L 780,360 L 720,380 L 650,420 L 630,390 L 600,360 L 580,300 L 560,250 L 540,180 L 510,120 Z', cx: 680, cy: 220 },
      { id: '桃園', name: '桃園區', path: 'M 480,260 L 500,255 L 530,260 L 560,250 L 580,300 L 600,360 L 560,380 L 520,410 L 490,340 Z', cx: 520, cy: 320 },
      { id: '八德', name: '八德區', path: 'M 520,410 L 560,380 L 600,360 L 630,390 L 650,420 L 620,460 L 580,480 L 540,460 L 500,450 L 510,430 Z', cx: 580, cy: 420 },
      { id: '大溪', name: '大溪區', path: 'M 650,420 L 720,380 L 780,360 L 860,320 L 890,380 L 920,450 L 850,520 L 720,580 L 650,620 L 580,640 L 460,650 L 500,600 L 540,540 L 580,480 L 620,460 Z', cx: 720, cy: 490 },
      { id: '觀音', name: '觀音區', path: 'M 120,400 L 150,340 L 180,280 L 200,250 L 240,265 L 270,270 L 310,290 L 280,340 L 260,380 L 200,390 Z', cx: 200, cy: 330 },
      { id: '中壢', name: '中壢區', path: 'M 310,290 L 340,285 L 380,280 L 420,270 L 450,265 L 480,260 L 490,340 L 520,410 L 510,430 L 500,450 L 470,480 L 420,530 L 360,540 L 300,550 L 280,450 L 260,380 L 280,340 Z', cx: 380, cy: 410 },
      { id: '新屋', name: '新屋區', path: 'M 80,680 L 60,600 L 60,520 L 80,460 L 120,400 L 200,390 L 260,380 L 280,450 L 300,550 L 250,600 L 200,750 L 140,720 Z', cx: 170, cy: 550 },
      { id: '平鎮', name: '平鎮區', path: 'M 420,530 L 470,480 L 500,450 L 540,460 L 580,480 L 540,540 L 500,600 L 460,650 L 400,640 L 340,620 L 380,580 Z', cx: 460, cy: 540 },
      { id: '楊梅', name: '楊梅區', path: 'M 200,750 L 250,600 L 300,550 L 360,540 L 420,530 L 380,580 L 340,620 L 330,680 L 350,780 L 280,780 Z', cx: 300, cy: 640 },
      { id: '龍潭', name: '龍潭區', path: 'M 350,780 L 330,680 L 340,620 L 400,640 L 460,650 L 580,640 L 650,620 L 720,580 L 680,680 L 600,760 L 500,820 L 420,810 Z', cx: 500, cy: 700 },
      { id: '復興', name: '復興區', path: 'M 720,580 L 850,520 L 920,450 L 960,550 L 980,650 L 940,800 L 880,950 L 750,960 L 650,920 L 560,860 L 500,820 L 600,760 L 680,680 Z', cx: 780, cy: 720 },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [people, setPeople] = useState([]);
      const [records, setRecords] = useState([]);
      const [groupLeaders, setGroupLeaders] = useState({});
      
      const [filterYear, setFilterYear] = useState('All');
      const [groupBy, setGroupBy] = useState('person');

      const [editingPersonId, setEditingPersonId] = useState(null);

      useEffect(() => {
        // 推進版本到 _v6 以強制更新快取
        const savedPeople = localStorage.getItem('doc_dash_people_v6');
        const savedRecords = localStorage.getItem('doc_dash_records_v6');
        const savedLeaders = localStorage.getItem('doc_dash_leaders_v6');
        if (savedPeople && savedRecords) {
          setPeople(JSON.parse(savedPeople));
          setRecords(JSON.parse(savedRecords));
          if (savedLeaders) setGroupLeaders(JSON.parse(savedLeaders));
        } else {
          setPeople(initialPeople);
          setRecords(initialRecords);
        }
      }, []);

      useEffect(() => {
        if (people.length > 0) {
          localStorage.setItem('doc_dash_people_v6', JSON.stringify(people));
          localStorage.setItem('doc_dash_records_v6', JSON.stringify(records));
          localStorage.setItem('doc_dash_leaders_v6', JSON.stringify(groupLeaders));
        }
      }, [people, records, groupLeaders]);

      const getPerson = (id) => {
        const p = people.find(p => p.id === id);
        if (p) return { ...p, isActive: p.isActive !== false };
        return { name: '未知', district: '未知', group: '未知', isActive: false };
      };

      const exportChartAsPNG = (chartId, filename) => {
        const svgElement = document.querySelector(`#${chartId} svg`);
        if (!svgElement) return alert("找不到圖表元素！");
        const svgData = new XMLSerializer().serializeToString(svgElement);
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const img = new Image();
        const rect = svgElement.getBoundingClientRect();
        canvas.width = rect.width * 2;
        canvas.height = rect.height * 2;
        img.onload = () => {
          ctx.fillStyle = "#0f172a"; 
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const a = document.createElement("a");
          a.download = `${filename}.png`;
          a.href = canvas.toDataURL("image/png");
          a.click();
        };
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
      };

      const handleExportBackup = () => {
        const backup = { people, records, groupLeaders, exportDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `SystemBackup_Cyber_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImportBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.people && data.records) {
              setPeople(data.people);
              setRecords(data.records);
              if (data.groupLeaders) setGroupLeaders(data.groupLeaders);
              alert('SYSTEM OVERRIDE: 資料還原成功！');
            } else {
              alert('ERROR: 備份檔案格式不正確！');
            }
          } catch (err) {
            alert('FATAL: 檔案解析失敗！');
          }
        };
        reader.readAsText(file);
      };

      const dashboardData = useMemo(() => {
        let filtered = records;
        if (filterYear !== 'All') {
          filtered = records.filter(r => r.year === filterYear);
        }

        const totalVolume = filtered.reduce((sum, r) => sum + r.volume, 0);
        const uniqueMonthsSet = new Set(filtered.map(r => `${r.year}-${r.month}`));
        const monthsCount = uniqueMonthsSet.size || 1;
        const monthlyAvg = Math.round(totalVolume / monthsCount);

        const deptTotalVolume = records.reduce((sum, r) => sum + r.volume, 0);
        const deptUniqueMonths = new Set(records.map(r => `${r.year}-${r.month}`)).size || 1;
        const deptMonthlyAvg = Math.round(deptTotalVolume / deptUniqueMonths);

        const trendMap = {};
        filtered.forEach(r => {
          const label = filterYear === 'All' ? `${r.year}年${r.month}月` : `${r.month}月`;
          const sortKey = filterYear === 'All' ? `${r.year}-${r.month.padStart(2, '0')}` : r.month.padStart(2, '0');
          if (!trendMap[sortKey]) trendMap[sortKey] = { name: label, '總件數': 0 };
          trendMap[sortKey]['總件數'] += r.volume;
        });
        const trendChartData = Object.keys(trendMap).sort().map(k => trendMap[k]);

        const breakdownMap = {};
        filtered.forEach(r => {
          const person = getPerson(r.personId);
          let key = '';
          if (groupBy === 'person') {
            key = person.name + (person.name !== '未知' && person.isActive === false ? '(離)' : '');
          }
          else if (groupBy === 'district') key = person.district;
          else if (groupBy === 'group') key = person.group;
          else if (groupBy === 'year') key = r.year + ' 年度'; 

          if (!breakdownMap[key]) breakdownMap[key] = { name: key, '件數': 0 };
          breakdownMap[key]['件數'] += r.volume;
        });
        
        let breakdownChartData = [];
        if (groupBy === 'year') {
          breakdownChartData = Object.values(breakdownMap).sort((a, b) => a.name.localeCompare(b.name));
        } else {
          breakdownChartData = Object.values(breakdownMap).sort((a, b) => b['件數'] - a['件數']);
        }

        const mapVolumes = {};
        ADMIN_DISTRICTS.forEach(d => mapVolumes[d.id] = 0);
        let mappedVolume = 0; 
        
        filtered.forEach(r => {
          const person = getPerson(r.personId);
          const distStr = person.district || '';
          const matched = ADMIN_DISTRICTS.filter(d => distStr.includes(d.id));
          if (matched.length > 0) {
            const splitVol = r.volume / matched.length;
            matched.forEach(d => {
              mapVolumes[d.id] += splitVol;
              mappedVolume += splitVol; 
            });
          }
        });

        let maxMapId = null;
        let maxMapVol = -1;
        ADMIN_DISTRICTS.forEach(d => {
          if(mapVolumes[d.id] > maxMapVol && mapVolumes[d.id] > 0) {
            maxMapVol = mapVolumes[d.id];
            maxMapId = d.id;
          }
        });

        return { 
          totalVolume, monthlyAvg, deptTotalVolume, deptMonthlyAvg, 
          trendChartData, breakdownChartData, 
          mapVolumes, maxMapId, mappedVolume
        };
      }, [records, filterYear, groupBy, people]);

      const availableYears = useMemo(() => {
        const years = new Set(records.map(r => r.year));
        return Array.from(years).sort().reverse();
      }, [records]);

      const glassPanelClass = "bg-[#0f172a]/80 backdrop-blur-md border border-cyan-500/30 p-6 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.1)] relative overflow-hidden";
      const inputClass = "w-full bg-[#040810] border border-cyan-500/40 text-cyan-100 placeholder-cyan-800 rounded-lg shadow-[inset_0_0_10px_rgba(6,182,212,0.1)] focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 focus:outline-none transition-all px-3 py-2";
      const labelClass = "block text-xs font-semibold text-cyan-400 tracking-wider mb-1 uppercase";
      const btnCyberClass = "bg-cyan-500/10 border border-cyan-400 text-cyan-300 hover:bg-cyan-400 hover:text-[#040810] px-4 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-all duration-300 shadow-[0_0_10px_rgba(6,182,212,0.2)] hover:shadow-[0_0_20px_rgba(6,182,212,0.6)]";

      const renderDashboard = () => (
        <div className="space-y-6 animate-in fade-in">
          <div className={`${glassPanelClass} !p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4`}>
            <div className="flex items-center gap-3">
              <Terminal className="text-cyan-400 w-6 h-6 animate-pulse" />
              <h2 className="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 tracking-widest">
                SYSTEM_OVERVIEW // 本科公文數據矩陣
              </h2>
            </div>
            
            <div className="flex items-center gap-2 bg-[#040810] p-1.5 rounded-lg border border-cyan-500/30 shadow-[inset_0_0_10px_rgba(6,182,212,0.1)]">
              <label className="text-xs font-bold text-cyan-600 uppercase tracking-widest pl-2 pr-1 hidden sm:block">DATA_YEAR</label>
              <button 
                onClick={() => setFilterYear('All')}
                className={`px-4 py-1.5 rounded-md text-xs font-black tracking-widest transition-all ${filterYear === 'All' ? 'bg-cyan-500 text-[#040810] shadow-[0_0_10px_rgba(34,211,238,0.6)]' : 'text-cyan-500 hover:bg-cyan-900/40'}`}
              >
                ALL
              </button>
              {availableYears.map(y => (
                <button 
                  key={y} 
                  onClick={() => setFilterYear(y)}
                  className={`px-4 py-1.5 rounded-md text-xs font-black tracking-widest transition-all ${filterYear === y ? 'bg-cyan-500 text-[#040810] shadow-[0_0_10px_rgba(34,211,238,0.6)]' : 'text-cyan-500 hover:bg-cyan-900/40'}`}
                >
                  {y}
                </button>
              ))}
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            {[
              { title: `${filterYear === 'All' ? '累計' : filterYear+'年'} 處理總量`, val: dashboardData.totalVolume, icon: FileText, color: 'text-cyan-400', border: 'border-cyan-400', glow: 'shadow-[inset_4px_0_20px_rgba(34,211,238,0.15)]' },
              { title: `${filterYear === 'All' ? '歷年' : filterYear+'年'} 月均算力`, val: dashboardData.monthlyAvg, icon: Activity, color: 'text-purple-400', border: 'border-purple-400', glow: 'shadow-[inset_4px_0_20px_rgba(168,85,247,0.15)]' },
              { title: '全域總處理量 [ALL]', val: dashboardData.deptTotalVolume, icon: Database, color: 'text-emerald-400', border: 'border-emerald-400', glow: 'shadow-[inset_4px_0_20px_rgba(52,211,153,0.15)]' },
              { title: '全域月均流速', val: dashboardData.deptMonthlyAvg, icon: TrendingUp, color: 'text-pink-400', border: 'border-pink-400', glow: 'shadow-[inset_4px_0_20px_rgba(244,114,182,0.15)]' },
            ].map((kpi, idx) => (
              <div key={idx} className={`bg-[#0f172a]/90 backdrop-blur-sm p-6 rounded-xl border-y border-r border-slate-700 border-l-4 ${kpi.border} ${kpi.glow} relative group hover:-translate-y-1 transition-transform`}>
                <div className="flex justify-between items-start relative z-10">
                  <div>
                    <p className="text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">{kpi.title}</p>
                    <h3 className={`text-4xl font-black ${kpi.color} drop-shadow-[0_0_10px_currentColor]`}>{kpi.val.toLocaleString()}</h3>
                  </div>
                  <div className={`p-2 bg-slate-800/50 rounded-lg border border-slate-700/50 group-hover:scale-110 transition-transform`}>
                    <kpi.icon className={`w-6 h-6 ${kpi.color}`} />
                  </div>
                </div>
                <div className={`absolute -bottom-6 -right-6 w-24 h-24 ${kpi.color.replace('text', 'bg')} opacity-10 rounded-full blur-2xl`}></div>
              </div>
            ))}
          </div>

          <div className={glassPanelClass}>
            <div className="flex justify-between items-center mb-6">
              <div className="flex items-center gap-4">
                 <h3 className="text-sm font-bold text-rose-300 tracking-widest flex items-center gap-2">
                   <Map className="w-4 h-4 text-rose-400" />
                   GEOSPATIAL_ANALYSIS // 桃園市行政區熱點
                 </h3>
                 <div className="px-3 py-1 bg-rose-950/40 border border-rose-500/30 rounded-full flex items-center gap-2 shadow-[0_0_10px_rgba(244,63,94,0.2)] hidden sm:flex">
                   <span className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
                   <span className="text-xs font-bold text-rose-300">
                     {filterYear === '115' ? '115年 [即時最高公文區]' : filterYear === 'All' ? '歷年累計 [最高公文區]' : `${filterYear}年度 [最高公文區]`}
                   </span>
                 </div>
              </div>
              <button onClick={() => exportChartAsPNG('map-chart', '行政區公文熱點圖')} className="text-rose-400 hover:text-white flex items-center gap-1 text-xs bg-rose-900/30 border border-rose-500/50 px-3 py-1.5 rounded-lg transition-colors hover:shadow-[0_0_10px_rgba(244,63,94,0.5)]">
                <Camera className="w-4 h-4" /> EXPORT_MAP
              </button>
            </div>
            
            <div id="map-chart" className="w-full relative bg-[#020408] rounded-xl border border-slate-800 shadow-inner overflow-hidden h-[600px] sm:h-[750px] lg:h-[900px]">
              <div className="absolute inset-0 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:40px_40px] opacity-20 pointer-events-none"></div>

                           autoFocus
                         />
                         <button onClick={handleSaveLeader} className="text-emerald-400 hover:text-emerald-300 p-1 bg-emerald-900/30 rounded border border-emerald-500/30 transition-colors" title="儲存"><Save className="w-4 h-4"/></button>
                         <button onClick={() => setEditingLeaderGroup(null)} className="text-red-400 hover:text-red-300 p-1 bg-red-900/30 rounded border border-red-500/30 transition-colors" title="取消"><X className="w-4 h-4"/></button>
                       </div>
                     ) : (
                       <div className="flex items-center gap-2 group/leader">
                         <span className={`font-black text-lg ${groupLeaders[activeGroupTab] ? 'text-cyan-300 drop-shadow-[0_0_5px_rgba(34,211,238,0.5)]' : 'text-slate-600'}`}>
                           {groupLeaders[activeGroupTab] || '尚未指派'}
                         </span>
                         <button 
                           onClick={() => {
                             setTempLeaderName(groupLeaders[activeGroupTab] || '');
                             setEditingLeaderGroup(activeGroupTab);
                           }} 
                           className="text-slate-500 hover:text-cyan-400 p-1.5 rounded-lg transition-colors opacity-0 group-hover/leader:opacity-100"
                           title="編輯股長"
                         >
                           <Edit2 className="w-4 h-4" />
                         </button>
                       </div>
                     )}
                  </div>
                </div>

                <div className="overflow-x-auto min-h-[250px]">
                  <table className="min-w-full divide-y divide-slate-800/50">
                    <thead className="bg-[#0a101f]">
                      <tr>
                        <th className="px-6 py-3 text-left text-xs font-bold text-slate-400 tracking-widest w-1/4">STATUS</th>
                        <th className="px-6 py-3 text-left text-xs font-bold text-slate-400 tracking-widest w-1/4">IDENTIFIER</th>
                        <th className="px-6 py-3 text-left text-xs font-bold text-slate-400 tracking-widest w-1/4">SECTOR</th>
                        <th className="px-6 py-3 text-right text-xs font-bold text-slate-400 tracking-widest w-1/4">ACTION</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-800/50">
                      {currentList.map(person => {
                        const isOnline = person.isActive !== false;
                        return (
                          <tr key={person.id} className={`transition-all duration-300 ${isOnline ? 'hover:bg-cyan-900/20' : 'opacity-50 grayscale hover:opacity-80 bg-slate-900/30'}`}>
                            <td className="px-6 py-4 whitespace-nowrap">
                              {isOnline ? (
                                 <span className="flex items-center gap-2 text-xs font-mono text-cyan-400">
                                   <span className="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_5px_#22d3ee] animate-pulse"></span>
                                   ONLINE
                                 </span>
                              ) : (
                                 <span className="flex items-center gap-2 text-xs font-mono text-slate-500">
                                   <span className="w-2 h-2 rounded-full bg-slate-500"></span>
                                   OFFLINE
                                 </span>
                              )}
                            </td>
                            <td className={`px-6 py-4 whitespace-nowrap font-medium ${isOnline ? 'text-cyan-50' : 'text-slate-400 line-through decoration-slate-600'}`}>{person.name}</td>
                            <td className={`px-6 py-4 whitespace-nowrap font-mono text-sm ${isOnline ? 'text-slate-300' : 'text-slate-500'}`}>{person.district}</td>
                            <td className="px-6 py-4 whitespace-nowrap text-right flex justify-end gap-2">
                              <button 
                                onClick={() => setEditingPersonId(person.id)} 
                                title="編輯公文數據"
                                className="text-purple-400 hover:text-purple-300 hover:bg-purple-900/30 p-2 rounded-lg transition-all border border-transparent hover:border-purple-500/50 shadow-[0_0_10px_rgba(168,85,247,0.1)]"
                              >
                                <FileSpreadsheet className="w-4 h-4" />
                              </button>
                              <button 
                                onClick={() => handleEditNode(person)} 
                                title="編輯人員節點"
                                className="text-emerald-400 hover:text-emerald-300 hover:bg-emerald-900/30 p-2 rounded-lg transition-all border border-transparent hover:border-emerald-500/50 shadow-[0_0_10px_rgba(16,185,129,0.1)]"
                              >
                                <Edit2 className="w-4 h-4" />
                              </button>
                              <button 
                                onClick={() => handleToggleStatus(person.id)} 
                                title={isOnline ? "設為非現職" : "設為現職"}
                                className={`p-2 rounded-lg transition-all border border-transparent ${isOnline ? 'text-yellow-500 hover:bg-yellow-900/20 hover:border-yellow-500/50' : 'text-cyan-500 hover:bg-cyan-900/20 hover:border-cyan-500/50'}`}
                              >
                                {isOnline ? <PowerOff className="w-4 h-4" /> : <Power className="w-4 h-4" />}
                              </button>
                              <button 
                                onClick={() => handleDeletePerson(person.id)} 
                                title="刪除節點"
                                className="text-red-400/50 hover:text-red-400 hover:bg-red-900/20 p-2 rounded-lg transition-all border border-transparent hover:border-red-500/50"
                              >
                                <Trash2 className="w-4 h-4" />
                              </button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : (
              <div className="bg-[#0f172a]/60 p-8 rounded-xl border border-dashed border-slate-700 text-center text-slate-500 font-mono">NO_DATA_FOUND // 尚無節點資料</div>
            )}
          </div>
        );
      };

      const SettingsManager = () => (
        <div className="space-y-6 animate-in fade-in max-w-3xl mx-auto">
          <div className={`${glassPanelClass} text-center !p-10`}>
            <div className="w-20 h-20 bg-blue-500/10 border-2 border-blue-400 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(59,130,246,0.3)]">
              <Save className="w-10 h-10" />
            </div>
            <h2 className="text-2xl font-black text-white mb-2 tracking-widest">SYSTEM_CORE // 系統資料封裝</h2>
            <p className="text-slate-400 mb-8 max-w-md mx-auto text-sm">
              執行資料庫快照與本機備份。請定期匯出 JSON 封裝檔以防記憶體流失。
            </p>
            
            <div className="flex flex-col sm:flex-row justify-center gap-6">
              <button 
                onClick={handleExportBackup}
                className="flex items-center justify-center gap-2 px-6 py-4 bg-blue-600/20 border-2 border-blue-500 text-blue-300 rounded-xl hover:bg-blue-500 hover:text-white transition-all font-bold tracking-widest shadow-[inset_0_0_15px_rgba(59,130,246,0.3)] hover:shadow-[0_0_20px_rgba(59,130,246,0.6)]"
              >
                <Download className="w-5 h-5" /> EXPORT_BACKUP
              </button>
              
              <label className="flex items-center justify-center gap-2 px-6 py-4 bg-[#040810] border-2 border-slate-600 text-slate-300 rounded-xl hover:border-blue-400 hover:text-blue-400 cursor-pointer transition-all font-bold tracking-widest shadow-lg">
                <Upload className="w-5 h-5" /> IMPORT_DATA
                <input type="file" accept=".json" className="hidden" onChange={handleImportBackup} />
              </label>
            </div>
          </div>
        </div>
      );

      const navItemClass = (isActive) => `
        w-full flex items-center gap-3 px-4 py-3.5 rounded-lg text-left transition-all duration-300 font-bold tracking-wider text-sm
        ${isActive 
          ? 'bg-cyan-500/10 text-cyan-300 border-l-4 border-cyan-400 shadow-[inset_20px_0_40px_rgba(34,211,238,0.05)]' 
          : 'text-slate-400 hover:bg-[#0f172a] hover:text-cyan-100 hover:border-l-4 hover:border-slate-600'}
      `;

      return (
        <div className="min-h-screen text-slate-200 flex flex-col md:flex-row font-sans selection:bg-cyan-500/30">
          
          <aside className="w-full md:w-64 bg-[#040810]/95 backdrop-blur-xl border-r border-cyan-500/20 flex-shrink-0 relative z-20 shadow-[4px_0_24px_rgba(0,0,0,0.5)]">
            <div className="p-6">
              <div className="flex items-center gap-3 mb-2">
                <div className="p-2 bg-cyan-500/10 rounded-lg border border-cyan-500/30 relative">
                   <div className="absolute inset-0 bg-cyan-400/20 blur animate-pulse"></div>
                   <Activity className="w-7 h-7 text-cyan-400 relative z-10" />
                </div>
                <h1 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500 drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]">
                  Volume of Documents
                </h1>
              </div>
              <p className="text-cyan-700 font-mono text-xs tracking-widest pl-1">V_10.0 // GITHUB_PAGES</p>
            </div>
            
            <nav className="px-4 space-y-2 pb-6 md:pb-0 mt-4">
              <button onClick={() => setActiveTab('dashboard')} className={navItemClass(activeTab === 'dashboard')}>
                <LayoutDashboard className="w-5 h-5" /> 視覺矩陣
              </button>
              <button onClick={() => setActiveTab('personnel')} className={navItemClass(activeTab === 'personnel')}>
                <Users className="w-5 h-5" /> 節點管理 (登錄)
              </button>
              <button onClick={() => setActiveTab('settings')} className={navItemClass(activeTab === 'settings')}>
                <Settings className="w-5 h-5" /> 系統維運
              </button>
            </nav>

            <div className="absolute bottom-4 left-4 right-4 border-t border-slate-800 pt-4 flex flex-col gap-2">
               <div className="h-1 w-full bg-slate-800 rounded overflow-hidden">
                 <div className="h-full bg-cyan-500/50 w-2/3 animate-pulse"></div>
               </div>
               <div className="text-[10px] text-slate-500 font-mono flex justify-between">
                 <span>SYS.STATUS</span>
                 <span className="text-cyan-500">ONLINE</span>
               </div>
            </div>
          </aside>

          <main className="flex-1 p-4 md:p-8 overflow-y-auto relative z-10">
            <div className="max-w-7xl mx-auto">
              {activeTab === 'dashboard' && renderDashboard()}
              {activeTab === 'personnel' && <PersonnelManager />}
              {activeTab === 'settings' && <SettingsManager />}
            </div>
          </main>

          {editingPersonId && (
            <PersonDetailModal 
              personId={editingPersonId} 
              onClose={() => setEditingPersonId(null)} 
            />
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
